name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-build:
    name: Client · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotify-clone/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spotify-clone/client/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
          VITE_API_BASE_URL: /api

  server-tests:
    name: Server · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotify-clone/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spotify-clone/server/package-lock.json
      - run: npm ci
      - run: npm test
